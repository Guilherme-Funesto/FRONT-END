<!DOCTYPE html>

<body>
    <header style="background-color: #111; padding: 10px; text-align: center; color: #fff;">

            <a href="../index.html" style="color:white;">Início</a> |

            <a href="../contato/contato.html" style="color:white;">Contato</a>
        </nav>

    <div class="conteudo">
        <h2>Entre em Contato</h2>
        <p>Quer compartilhar sua paixão por filmes de terror ou fazer sugestões? Preencha o formulário abaixo.</p>

        <form id="formContato">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome" class="input-form"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" class="input-form"><br><br>

            <label for="mensagem">Mensagem:</label><br>
            <textarea id="mensagem" name="mensagem" class="input-form"></textarea><br><br>

            <button type="submit" style="background-color: darkred; color: white; padding: 5px 10px;">Enviar</button>
        </form>
    </div>

    <footer style="background-color: #333; color: #fff; text-align: center; padding: 10px;">
