<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Terror Slasher Clássico</title>

    <style>
        /* ===== Corpo da página ===== */
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(black, #1a0000);
            color: #f5f5f5;
            margin: 0;
        }

        /* ===== Cabeçalho ===== */
        header {
            background-color: #000;
            text-align: center;
            padding: 25px;
            font-size: 32px;
            font-family: "Courier New", monospace;
            color: red;
            text-shadow: 2px 2px 5px black;
            border-bottom: 3px solid darkred;
        }

        /* ===== Navegação ===== */
        nav {
            background-color: #111;
            padding: 12px;
            text-align: center;
            border-bottom: 2px solid red;
        }

        nav a {
            color: red;
            text-decoration: none;
            margin: 10px;
            font-size: 18px;
            padding: 8px 12px;
            border: 1px solid red;
            border-radius: 5px;
            background-color: black;
            transition: 0.3s;
        }

        nav a:hover {
            background-color: red;
            color: black;
            transform: scale(1.1);
        }

        /* ===== Seções ===== */
        section {
            padding: 20px;
            margin: 20px;
            border: 2px solid darkred;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.7);
        }

        h2 {
            font-size: 26px;
            font-family: Georgia, serif;
            color: red;
            text-shadow: 1px 1px 3px black;
        }

        h3 {
            font-family: Verdana, sans-serif;
            color: #ff4d4d;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
        }

        /* ===== Filmes ===== */
        .filme {
            margin: 15px 0;
            padding: 20px;
            border: 2px dashed red;
            border-radius: 10px;
            box-shadow: 2px 2px 15px black;
            background-color: #1a0000;
        }

        img {
            border: 2px solid white;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* ===== Contato ===== */
        #contato input,
        #contato textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background-color: #111;
            color: white;
            border: 1px solid red;
            border-radius: 5px;
        }

        #contato button {
            background-color: darkred;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 5px;
        }

        #contato button:hover {
            background-color: red;
            color: black;
        }

        /* ===== Rodapé ===== */
        footer {
            text-align: center;
            padding: 15px;
            background-color: black;
            font-size: 14px;
            margin-top: 20px;
            border-top: 2px solid red;
        }

    </style>
</head>

<body>

<header>
    🎬 Terror Slasher Clássico
</header>

<nav>
    <a href="/20260331/index.html">Início</a>
    <a href="#filmes">Filmes</a>
    <a href="/20260331/Contato/Contato.html">Contato</a>
</nav>



<section id="contato">
    <h2>Contato</h2>
    <p>Quer compartilhar sua paixão por filmes de terror ou fazer sugestões? Preencha o formulário abaixo.</p>

    <form id="formContato">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem"></textarea><br><br>

        <button type="submit">Enviar</button>
    </form>
</section>

<footer>
    © 2026 - Site sobre filmes de terror slasher
</footer>

</body>
</html>
